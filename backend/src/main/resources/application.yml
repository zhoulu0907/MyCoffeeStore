server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: my-coffee-store
  datasource:
    # PostgreSQL Docker 配置
    url: jdbc:postgresql://localhost:5432/coffee_store
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null
  # Redis 配置
  data:
    redis:
      enabled: true
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3000
      # 对话记忆配置
      memory:
        ttl: 86400  # Redis 中消息的 TTL（秒），默认 24 小时
        max-messages: 100  # 每个会话最多保留的消息数量
        key-prefix: "conversation:"  # Redis Key 前缀

# MyBatis-Flex 配置
mybatis-flex:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mycoffeestore.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.mycoffeestore: debug
    com.mycoffeestore.mapper: debug

jwt:
  secret: myCoffeeStoreSecretKey2024ForJWTTokenGeneration
  expiration: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Modelscope AI 配置
modelscope:
  api-key: ${MODELSCOPE_API_KEY:sk-placeholder}
  base-url: https://api-inference.modelscope.cn/v1
  model: moonshotai/Kimi-K2.5
  timeout: 60000

# LLM 加密配置
llm:
  enabled: true
  provider: modelscope
  encryption:
    # 主密钥环境变量名（优先级最高）
    master-key-env: LLM_MASTER_KEY
    # 主密钥文件路径（环境变量不存在时使用）
    master-key-file: ${user.home}/.mycoffeestore/master.key

# Agent 配置
agent:
  enabled: true
  implementation-type: react  # direct（直接 API 调用）或 react（ReactAgent 实现）
  max-chat-history: 10
  session-timeout: 1800  # 30 分钟
  enable-memory: true
  enable-streaming: true
  max-tool-rounds: 5
  agents:
    coffee-advisor:
      temperature: 0.7
      max-recommendations: 3
    order-assistant:
      temperature: 0.6
      require-login: true
    customer-service:
      temperature: 0.5
      show-store-info: true
